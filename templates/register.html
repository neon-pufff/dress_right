<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="./style.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      background-color: #7ecfd1;
      font-family: Arial, sans-serif;
    }


    .container {
      background-color: #7ecfd1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }


    .registration-container {
      background-color: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      max-width: 450px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: #7ecfd1;
      outline: none;
      box-shadow: 0 0 0 3px rgba(126, 207, 209, 0.3);
    }

    .hint {
      display: block;
      font-size: 12px;
      color: #718096;
      margin-top: 5px;
    }

    .btn-register {
      width: 100%;
      padding: 12px;
      background-color: #7ecfd1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }



    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .alert-error {
      background-color: #fed7d7;
      color: #9b2c2c;
      border-left: 4px solid #fc8181;
    }

    .links {
      text-align: center;
      margin-top: 25px;
    }

    .links p {
      margin: 8px 0;
    }

    .links a {
      color: #7ecfd1;
      text-decoration: none;
      font-weight: 600;
    }

    .links a:hover {
      text-decoration: underline;
    }


  </style>
</head>
<body>
  <div class="container">
    <div class="registration-container">
      <h1>Создать аккаунт</h1>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" class="registration-form">
        <div class="form-group">
          <label for="login">Логин</label>
          <input
            type="text"
            id="login"
            name="login"
            placeholder="Введите ваш логин"
            required
            minlength="3"
            maxlength="30"
            value="{{ login if login else '' }}"
          >
          <span class="hint">От 3 до 30 символов (буквы, цифры, _, -, .)</span>
        </div>


        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Введите пароль"
           required
            minlength="6"
            maxlength="100"
          >
          <span class="hint">Минимум 6 символов</span>
        </div>

        <div class="form-group">
          <label for="confirm_password">Подтверждение пароля</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Подтвердите пароль"
            required
          >
        </div>

        <button type="submit" class="btn-register">Зарегистрироваться</button>
      </form>

      <div class="links">
        <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
        <p><a href="{{ url_for('main') }}">← На главную</a></p>
      </div>
    </div>
  </div>
</body>
</html>
